version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: botatlas-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: botatlas
      POSTGRES_USER: botatlas
      POSTGRES_PASSWORD: botatlas_dev_2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botatlas"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
